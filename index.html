an anyone would consider "reasonable"—not because I had to, but because each iteration revealed something new. A zero-branch Fibonacci by seeding with −1 and 1. A sieve optimization that shaved microseconds.',highlight:"These aren't just technical wins; they're discoveries.",discovery:{title:"Rediscovering Horner's Method",story:"During university, frustrated with the heavy calculations of binary-to-decimal conversion (even with shortcuts), I experimented and found my own technique: start from the leftmost 1, move right — multiply the result by 2, add the next digit. Repeat until the end. Years later, I learned I had independently discovered Horner's Method of base conversion — a moment that validated my trust in mathematical intuition."}},{title:"Succeeding Within the Failures",content:"Sometimes the original goal remains out of reach—but along the way, I stumble upon something profound. A technique. An insight. A connection I hadn't anticipated.",highlight:"Failure isn't an endpoint—it's a checkpoint where unexpected treasures reveal themselves.",phasedDiscovery:{title:"The Granite 2000000 Incident",period:"July 2022 · Summer Holidays",phases:[{label:"The Blackout",content:'After three years away from gaming, I was deep into Far Cry 6 and genuinely enjoying it again. Then, mid-autosave, electricity went out. On reboot, the game showed "Error: Granite 2000000." Months of progress looked gone, and no real fix existed online.'},{label:"The Discovery",content:"Using my data recovery instincts, I inspected the save files. One autosave had the right size but only null bytes. Then I noticed each file had a numbered counterpart (_01 / _02). The counterpart had real data. I replaced the corrupted file with it and loaded the game from the exact interrupted moment."},{label:"The Ripple",content:"I validated the method repeatedly, then compressed the fix into a 40-second YouTube tutorial. It spread quickly across forums and helped players in Far Cry 5, New Dawn, and Far Cry 4
