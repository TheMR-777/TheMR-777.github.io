s://www.linkedin.com/in/777-ammar",website:"https://TheMR-777.github.io/",whatsapp:"https://wa.me/923145401405"},stats:{experience:"6+ Years",projects:"20+",productivity:"200%",cgpa:"3.73"},interests:[{name:"Astronomy",description:"Second-largest passion after computing. I study the cosmos through expert voices to build [ac]intuition[/ac]—not rote facts—about black holes, stellar evolution, and cosmic structure."},{name:"Physics",description:"A late-blooming love that became a core lens. I build intuitive models about electromagnetism, chip fabrication, GPUs, and hardware architectures through [hi]thoughtful exploration[/hi]."},{name:"Psychology",description:"Nurtured by my psychologist mother's open conversations. I study cognitive biases and learning science — because [em]understanding how the mind learns is the most valuable thing I have learned[/em]."}]},philosophy:{mainQuote:"The scale of the goal has [hi]never[/hi] mattered to me—what matters is the [ac]journey[/ac] of getting there.",cardText:`Whether I'm architecting a comprehensive system like the [c=text-text-primary font-medium]Employee Monitoring Suite[/c], or spending hours refining something as "simple" as a prime number generation algorithm, the experience is the same: an [ac]insatiable curiosity[/ac] that drives me to discover one more micro-optimization, one more elegant simplification, one more insight I hadn't seen before.`,sections:[{title:"The Journey Over the Goal",content:"Whether architecting a comprehensive system or spending hours refining a Fibonacci sequence, the experience is the same: an insatiable curiosity that drives me to discover one more micro-optimization, one more elegant simplification.",highlight:"The destination is just a waypoint—the real reward is the infinite richness of the journey itself."},{title:"The Beauty in Fundamentals",content:'I vividly remember iterating on fundamental algorithms for far longer than anyone would consider "reasonable"—not because I had to, but because each iteration revealed something new. A zero-branch Fibonacci by seeding with −1 and 1. A sieve optimization that shaved microseconds.',highlight:"These aren't just technical wins; they're discoveries.",discovery:{title:"Rediscovering Horner's Method",story:"During university, frustrated with the heavy calculations of binary-to-decimal conversion (even with shortcuts), I experimented and found my own technique: start from the leftmost 1, move right — multiply the result by 2, add the next digit. Repeat until the end. Years later, I learned I had independently discovered Horner's Method of base conversion — a moment that validated my trust in mathematical intuition."}},{title:"Succeeding Within the Failures",content:"Sometimes the original goal remains out of reach—but along the way, I stumble upon something profound. A technique. An insight. A connection I hadn't anticipated.",highlight:"Failure isn't an endpoint—it's a checkpoint where unexpected treasures reveal themselves.",phasedDiscovery:{title:"The Granite 2000000 Incident",period:"July 2022 · Summer Holidays",phases:[{label:"The Blackout",content:'After three years away from gaming, I was deep into Far Cry 6 and genuinely enjoying it again. Then, mid-autosave, electricity went out. On reboot, the game showed "Error: Granite 2000000." Months of progress looked gone, and no real fix existed online.'},{label:"The Discovery",content:"Using my data recovery instincts, I inspected the save files. One autosave had the right size but only null bytes. Then I noticed each file had a numbered counterpart (_01 / _02). The counterpart had real data. I replaced the corrupted file with it and loaded the game from the exact interrupted moment."},{label:"The Ripple",content:"I validated the method repeatedly, then compressed the fix into a 40-second YouTube tutorial. It spread quickly across forums and helped players in Far Cry 5, New Dawn, and Far Cry 4 too. I still receive appreciation comments today."}],link:"https://www.youtube.com/watch?v=cPH_SZKI_Cg"}},{title:"Beyond Computer Science",content:"This philosophy extends far beyond computing. It applies to Mathematics, where a proof's elegance can be refined endlessly. It applies to Physics, where understanding one concept unlocks intuition for a dozen others. It applies to every domain where depth is possible—and depth is always possible.",highlight:"Computer Science is only one language of discovery; every domain is a fractal, where curiosity reveals that there is no bottom—only deeper truth and beauty."},{title:"The Discipline of Restraint",content:"Design and formatting should be like seasoning — [hi]precise application[/hi] enhances, but over-application ruins. Silence is as important as sound. Quiet zones give the eye a resting point, allowing the accents to speak. I believe in highlighting the [ac]core essence[/ac] and letting the surrounding structure remain elegantly plain. This portfolio itself is a living testament — every accent, every highlight, every silent plain-text zone was a [em]deliberate design choice[/em].",highlight:"If everything is accented, nothing is. True sophistication lies in what you choose not to highlight."},{title:"Learning How to Learn",content:"Along the way of my life, I learned something most people never do — how to actually learn. Not to remember, not to follow footsteps, but to build connections. To relate a new concept to something I already know, and integrate it so deeply into my intuition that it becomes part of how I think. That is the real skill — and it compounds across every domain I touch.",highlight:"Not learning to remember — learning to learn.",metaSkill:{title:"The Ultimate Mindset",story:"That is where I am heading — toward a mindset that strives for perfection and accuracy. Every realm I explore — Astronomy, Physics, Psychology — is not random curiosity. Each one builds pathways that make me sharper in every other."}}],principles:[{icon:"compass",title:"Beyond the Recipe",description:"I don't accept surface answers. I challenge existing implementations and build connections between ideas — until knowledge becomes intuition."},{icon:"layers",title:"Precision",description:"True mastery shows in removing what doesn't belong. I cut complexity and spot inefficiencies — small changes, disproportionate gains."},{icon:"lightbulb",title:"Adaptability",description:"Each problem deserves a solution tailored to its unique constraints, not forced generic templates."},{icon:"sparkles",title:"Evolution",description:"Making things genuinely better, not just different. Refining until the result feels inevitable."}],toolsPhilosophy:{title:"Tools That Transform",content:"Most software exists to [hi]remember[/hi] — to store records, log transactions, and keep notes organized. Important work, but not what ignites my passion.",essence:"What excites me is building software that takes something [c=text-text-secondary]in[/c], and gives something [ac]genuinely new[/ac] back. Software that [ac]transforms[/ac].",grid:[{verb:"Reveal",icon:"◐",description:"Making the invisible visible — uncovering hidden patterns"},{verb:"Simplify",icon:"◇",description:"Reducing complexity to clarity — distilling essence"},{verb:"Automate",icon:"↻",description:"Freeing humans from repetitive, mundane work"},{verb:"Connect",icon:"⬡",description:"Bridging isolated systems — creating synergy"},{verb:"Simulate",icon:"◈",description:"Replacing costly trials with digital insight"},{verb:"Empower",icon:"△",description:"Enabling capabilities that didn't exist before"}],mantra:{input:"Input",transformation:"Transformation",output:"Value"},closingThought:"Software worth building leaves the world different than it found it."},architecturalPhilosophy:{content:"I don't just [hi]memorize[/hi] patterns—I understand them at their core: [c=text-accent]what problem[/c] each pattern solves, [c=text-accent]how[/c] it solves it, and [c=text-accent]where it falls short[/c].",revealText1:"Patterns are the surface. Understanding is what lies beneath.",revealText2:"I don't just build systems — I build the intuition that builds systems.",revealText3:"[ac]Learn how to learn,[/ac] and everything else follows."}},journey:{genesis:{title:"The Genesis",period:"Age 3-10",description:"My journey began at age 3, shaped by my uncle's computer. What started with GTA Vice City and SEGA wasn't just entertainment — it planted the seed of an [ac]insatiable curiosity[/ac] about how systems work. When gifted a Windows XP PC, limited access became my greatest teacher: I learned to [hi]troubleshoot[/hi], [hi]experiment[/hi], and [hi]discover independently[/hi] — a pattern that would define everything I build today."},awakening:{title:"The Awakening",period:"Teenage Years",description:"Watching 'Inkeshaaf' on 24 News ignited my passion for [ac]ethical hacking[/ac]. I set an 'impossible' goal: hack an Android from another Android. Over a year, I learned Linux, Python, and networking from first principles — pioneering [hi]mobile-to-mobile penetration testing[/hi]. That work became the 2nd most-read Null Byte article (2018-2020) and led me to found a cybersecurity community across 6 countries. The security mindset I built here later shaped every system I've secured since."},academic:{title:"Academic Excellence",period:"2019-2023",description:"At University of the Punjab, I earned a [ac]3.73 CGPA[/ac] while pursuing depth far beyond the curriculum — implementing every data structure and algorithm in [hi]modern C++[/hi] a full year before coursework, because [em]understanding beats memorization[/em]. Became an unofficial C++ teaching assistant in my second semester, collaborated with a visiting PhD professor on quantum computing simulations, and was the first team to complete both FYP and research papers simultaneously."},professional:{title:"Professional Evolution",period:"2023-Present",description:"My industry entry was strategic: a TeqHolic Flutter internship, a leveraged Rev9 AI team offer, and a direct CTO selection at ACE Money Transfer. Now as .NET Developer & Architecture Consultant, I've channeled every skill — from low-level C++ and cryptography to polyglot system design — into enterprise-grade products. The defining achievement: devoting an entire year to the [c=text-text-primary font-medium]Employee Monitoring Suite[/c], a system I consider a [ac]professional masterpiece[/ac] and a crucible for every engineering principle I hold."}},skills:{languages:[{name:"C++",level:"Expert",years:"6+",tags:["Modern C++23/26","Template Metaprogramming"],extraTags:["STL","SFINAE & Concepts","Lock-free Programming","Memory Management","RAII","Move Semantics"]},{name:"C# / .NET",level:"Advanced",years:"3+",tags:[".NET 9","LINQ","Async/Await"],extraTags:["Blazor","EF Core","Source Generators","Minimal APIs","SignalR"]},{name:"Python",level:"Intermediate",years:"5+",tags:["Scientific Computing","Automation","ML"],extraTags:["NumPy","SciPy","Matplotlib","Rich TUI","Scripting"]},{name:"TypeScript",level:"Intermediate",years:"2+",tags:["Angular","Node.js","ES6+"],extraTags:["Type Safety","Generics","RxJS","PrimeNG"]},{name:"SQL",level:"Advanced",years:"4+",tags:["Complex Queries","Optimization"],extraTags:["PostgreSQL","Stored Procedures","Indexing","Query Planning"]},{name:"Dart",level:"Proficient",years:"3+",tags:["Flutter","State Management"],extraTags:["Provider","Riverpod","Material Design","Responsive UI"]},{name:"MATLAB",level:"Intermediate",years:"2+",tags:["Signal Processing","Simulation"],extraTags:["Visualization","Numerical Methods","Quantum Simulations"]}],frameworks:[{name:".NET Core / Blazor",category:"Backend",tags:["ASP.NET Core","EF Core","Minimal APIs"]},{name:"Angular 20",category:"Frontend",tags:["PrimeNG","RxJS","TypeScript"]},{name:"Flutter",category:"Mobile",tags:["Dart","Provider","Material Design"]},{name:"AvaloniaUI / WPF",category:"Desktop",tags:["XAML","MVVM","Cross-platform"]},{name:"SignalR / gRPC",category:"Real-time",tags:["WebS anding of design patterns. I didn't just memorize patterns—I understood them at their core: what problem each pattern solves, how it solves it, why it was even needed, and where it falls short. This depth of understanding enabled me to architect a custom architecture that wasn't constrained by textbook templates.",architecturalOutcomes:["Minimal and elegant: No unnecessary abstractions; every component earned its place","Efficient and optimized: Performance was a first-class citizen, not an afterthought","Extendable: New features integrated seamlessly without architectural surgery","Maintainable: Clear separation of concerns made the codebase approachable","Consistent and predictable: Behavior was deterministic; no surprises in production"],impact:["Zero defects at production launch","200% productivity increase measured company-wide","35% reduction in unauthorized breaks","Recognized as a professional masterpiece","Established as company standard for monitoring"],tech:[".NET","Blazor","GraphQL","ApexCharts","Micro-ORM"]},{name:"Evolver — Auto-Update Engine",type:"Infrastructure • EMS Component",period:"1 Month Engineering",summary:"Chromium-inspired cross-platform auto-update engine with error-resilient backup management, engineered as part of EMS.",description:"Spent an entire month engineering a chromium-inspired auto-update mechanism for the Employee Monitoring Suite. This was one of the most highly engineered things I made at ACE — a system handling inter-process communication, error-resilient backup management, and cross-platform reliability. Presented to the CTO and received high praise for engineering depth.",architecturalHighlights:["Chromium-inspired architecture with staged rollouts","Cross-platform reliability (Windows + macOS) — a rare achievement few software pull off","Inter-process communication between EMS and dedicated updater app","Separate integrated companion app for on-demand updating","Companion deployment tool for streamlined build distribution","Error-resilient with automatic backup management and data recovery","Graceful rollback on update failure","Presented to CTO and praised for engineering depth"],impact:["Zero failed updates since deployment","Seamless cross-platform update experience","Reduced deployment friction to near-zero","Praised by CTO as exemplary engineering"],tech:[".NET","C#","IPC","File System APIs","AvaloniaUI"]},{name:"ERP Platform Core",type:"Platform • Architecture",period:"2023 — Dec 2025",summary:"Multi-tenant platform with composable subsystems powering all business modules.",description:"Built and standardized ERP as a multi-tenant platform by engineering reusable core subsystems—not one-off module logic. Every business module now plugs into this backbone.",modules:[{name:"Composable Permissions & Rights",description:"Tenant-aware, module-agnostic access control designed for easy integration.",impact:"Eliminated redundant auth code across 5+ modules"},{name:"Approvals Orchestration Engine",description:"Generic plug-in workflow layer (approve/reject/escalate) usable by any module.",impact:"Reduced approval implementation time by 80%"},{name:"Rules + Thresholds Framework",description:"Centralized policy engine driving approvals, restrictions, escalations, and notifications.",impact:"Enabled non-developer policy changes"},{name:"Notifications & Template Center",description:"Multi-channel delivery (Email/In-App/Push/WhatsApp) with runtime-managed, localizable templates.",impact:"Unified notification logic, 60% less code"},{name:"Dynamic JSON Form Engine",description:"Schema-driven UI generation in TypeScript. Theme-compliant and reusable across modules.",impact:"Cut form development time by 70%"},{name:"Command Palette",description:"Rights-compliant navigation with fuzzy search and score-based ranking. VS Code/Spotlight-style UX.",impact:"Improved navigation efficiency 3x"},{name:"Documents Management",description:"Blob storage + AWS time-bound links + fallback handling; extremely
